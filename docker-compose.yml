version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: booking_platform_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: booking_platform
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: .
    container_name: booking_platform_api
    restart: always
    ports:
      - '3000:3000'
    depends_on:
      - db
    environment:
      PORT: 3000
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_NAME: booking_platform
      JWT_SECRET: supersecretkey
      JWT_EXPIRES_IN: 1d

volumes:
  pgdata:
